ai_tools_used:
  - "Kiro (AWS)"              # Architecture discussion, code review, debugging
  - "Antigravity (Google DeepMind)"  # Submission metadata and code assistance

ai_usage_summary: |
  Used Kiro (AWS AI assistant) for architecture discussion, code review, and
  debugging throughout the project. Used Antigravity (Google DeepMind) for
  submission metadata finalization and code assistance.
  All candidate data processing is fully local — no candidate data was sent to
  any external API at any point. The ranking system uses local Ollama (qwen3:8b)
  for LLM scoring during pre-computation, and pure deterministic math during
  rank.py. No AI tool was given access to any candidate profiles.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-layer ranking architecture:

  Layer 1 — Honeypot Detection (12 checks, 2 tiers): Filters ~80 impossible
  profiles using hard signals (salary inversion, GitHub paradox) and soft signals
  (2+ independent impossibilities). Zero honeypots in final top-100.

  Layer 2 — Behavioral Composite (deterministic, no LLM): Scores all 100K
  candidates on skill taxonomy (10 categories), career quality (product-company
  bias, consulting penalty), experience sweet-spot (5-9 yrs), education tier, and
  23 Redrob platform engagement signals. Runs in ~3 min on CPU.

  Layer 3 — LLM Evidence-Grounded Scoring (pre-computed, Ollama qwen3:8b):
  Top 200 candidates receive full evidence Q&A scoring (Step 5), parallel passes
  for open signals / red flags / hard gates (Step 6), and weighted score assembly
  (Step 7). Evidence quotes are fuzzy-validated against source text.

  Final composite: 0.65 × LLM_score/10 + 0.25 × behavioral + 0.10 × embedding.
  rank.py reads precomputed artifacts and produces submission.csv in <10 seconds.

